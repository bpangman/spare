name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Structure Pages output
        run: |
          mkdir -p dist-pages

          # Landing page at root
          cp landing/index.html dist-pages/index.html

          # React prototype app at /demo/
          mkdir -p dist-pages/demo
          cp -r dist/* dist-pages/demo/

          # Dashboard
          mkdir -p dist-pages/dashboard
          cp dashboard/index.html dist-pages/dashboard/index.html

          # Legal pages
          mkdir -p dist-pages/legal/privacy dist-pages/legal/terms
          cp legal/privacy/index.html dist-pages/legal/privacy/index.html
          cp legal/terms/index.html dist-pages/legal/terms/index.html

          # Static assets for landing page
          cp public/logo.png dist-pages/logo.png

          # CNAME for custom domain
          cp CNAME dist-pages/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
